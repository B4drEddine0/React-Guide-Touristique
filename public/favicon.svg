<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0077B6"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="wave" x1="10" y1="38" x2="54" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Compass needle / pin top -->
  <path d="M32 12 L37 28 L32 26 L27 28 Z" fill="white" opacity="0.95"/>
  <circle cx="32" cy="28" r="5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="28" r="2.5" fill="url(#bg)"/>
  <!-- Wave 1 -->
  <path d="M10 40 Q18 34, 26 40 Q34 46, 42 40 Q50 34, 54 40" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Wave 2 -->
  <path d="M10 48 Q18 42, 26 48 Q34 54, 42 48 Q50 42, 54 48" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
